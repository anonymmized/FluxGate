name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: fluxgate-linux-amd64
          - os: macos-14
            artifact: fluxgate-macos-arm64
          # Intel macOS (macos-13) runners are frequently unavailable and stall
          # the whole release. Apple Silicon + Linux cover the vast majority;
          # Intel Mac users can build from source. Re-add if runner supply
          # improves.

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          ${{ runner.os == 'macOS' && '-DOPENSSL_ROOT_DIR=$(brew --prefix openssl)' || '' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Rename binary
        run: cp build/FluxGate ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Desktop app installers (Electron) ──────────────────────────────────────
  # Built on native runners so each platform produces a real installer:
  #   macOS  → .dmg (+ .zip)      Linux → .AppImage + .deb
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: dist:mac
          - os: ubuntu-24.04
            target: dist:linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build desktop installer
        working-directory: desktop
        env:
          # Build unsigned installers — no Apple Developer identity in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          npm ci
          npm run ${{ matrix.target }}

      - name: Collect installers
        run: |
          mkdir -p desktop-installers
          find desktop/dist -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} desktop-installers/ \;
          ls -la desktop-installers

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: desktop-installers/*

  release:
    needs: [build, desktop]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum fluxgate-* *.dmg *.AppImage *.deb 2>/dev/null > SHA256SUMS.txt || true
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/fluxgate-linux-amd64
            dist/fluxgate-macos-arm64
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.deb
            dist/SHA256SUMS.txt
