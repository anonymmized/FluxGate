name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            redis: false
          - os: ubuntu-24.04
            redis: true
          - os: macos-14
            redis: false
    runs-on: ${{ matrix.os }}

    services:
      redis:
        image: ${{ matrix.redis && 'redis:7-alpine' || '' }}
        ports:
          - 6379:6379
        options: ${{ matrix.redis && '--health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5' || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libssl-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake openssl

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          -DFLUXGATE_REDIS=${{ matrix.redis && 'ON' || 'OFF' }}
          ${{ runner.os == 'macOS' && '-DOPENSSL_ROOT_DIR=$(brew --prefix openssl)' || '' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
